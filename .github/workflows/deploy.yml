name: Deploy HTML to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: html-app
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        echo ${{ secrets.ACR_PASSWORD }} | docker login $REGISTRY -u ${{ secrets.ACR_USERNAME }} --password-stdin

    - name: Build image
      run: |
        docker build --platform linux/amd64 -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .

    - name: Push image
      run: |
        docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}

    - name: Deploy to Container Apps
      run: |
        az containerapp update \
          --name reyacont \
          --resource-group <RG_NAME> \
          --image $REGISTRY/$IMAGE_NAME:${{ github.sha }}
